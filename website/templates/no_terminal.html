{% extends "base.html" %}

{% block title %}Терминал не найден - СберЭкран{% endblock %}

{% block content %}
<div class="card">

  <div class="icon-wrap red">
    <svg width="42" height="42" viewBox="0 0 42 42" fill="none">
      <path d="M13 13L29 29M29 13L13 29" stroke="#E5383B" stroke-width="3.5" stroke-linecap="round"/>
    </svg>
  </div>
  <h1>Терминал не найден</h1>

     <span class="tid">{{ terminal_id }}</span><br>

  <div class="sber-logo">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="11" fill="#21A038"/>
